<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Get Firebase Token</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h2 { color: #fff; }
    input { width: 100%; padding: 8px; margin: 4px 0 12px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #3367d6; }
    #token-box { margin-top: 20px; }
    textarea { width: 100%; height: 120px; background: #1a1a1a; color: #0f0; border: 1px solid #333; padding: 8px; font-size: 11px; box-sizing: border-box; border-radius: 4px; }
    #status { margin: 10px 0; color: #aaa; }
    .label { color: #aaa; font-size: 12px; margin-bottom: 2px; }
    .ws-url { color: #0f0; font-size: 11px; word-break: break-all; margin-top: 8px; background: #1a1a1a; padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>🔑 Get Firebase ID Token</h2>
  <p style="color:#aaa">Sign in to get a token you can use to test the WebSocket endpoint in Postman.</p>

  <div class="label">Email</div>
  <input type="email" id="email" placeholder="your@email.com" />

  <div class="label">Password</div>
  <input type="password" id="password" placeholder="password" />

  <button onclick="signIn()">Sign In</button>
  <button onclick="refreshToken()" id="refresh-btn" style="display:none">Refresh Token</button>
  <button onclick="signOut()" id="signout-btn" style="display:none;background:#c0392b">Sign Out</button>

  <div id="status"></div>

  <div id="token-box" style="display:none">
    <div class="label">Firebase ID Token (valid ~1 hour):</div>
    <textarea id="token-output" readonly onclick="this.select()"></textarea>

    <button onclick="copyToken()" style="margin-top:8px;background:#27ae60">Copy Token</button>

    <div class="label" style="margin-top:16px">Postman WebSocket URL:</div>
    <div class="ws-url" id="ws-url"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyDbCDXsSAPGz4l1pLEPtH0I-Vgaj3-iD1Y",
      authDomain:        "rally-go-6.firebaseapp.com",
      projectId:         "rally-go-6",
      storageBucket:     "rally-go-6.firebasestorage.app",
      messagingSenderId: "371906055890",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const WS_BASE = "ws://localhost:8080";

    function setStatus(msg, color = "#aaa") {
      document.getElementById("status").style.color = color;
      document.getElementById("status").textContent = msg;
    }

    async function showToken(user) {
      const token = await user.getIdToken(/* forceRefresh */ true);
      document.getElementById("token-output").value = token;
      document.getElementById("token-box").style.display = "block";
      document.getElementById("ws-url").textContent =
        `${WS_BASE}/ws?room_id=test-room&token=${token}`;
      document.getElementById("refresh-btn").style.display = "inline-block";
      document.getElementById("signout-btn").style.display = "inline-block";
      setStatus(`Signed in as ${user.email}`, "#2ecc71");
    }

    window.signIn = async function () {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      setStatus("Signing in…");
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await showToken(cred.user);
      } catch (e) {
        setStatus(`Error: ${e.message}`, "#e74c3c");
      }
    };

    window.refreshToken = async function () {
      const user = auth.currentUser;
      if (user) await showToken(user);
    };

    window.signOut = async function () {
      await fbSignOut(auth);
      document.getElementById("token-box").style.display = "none";
      document.getElementById("refresh-btn").style.display = "none";
      document.getElementById("signout-btn").style.display = "none";
      setStatus("Signed out.");
    };

    window.copyToken = function () {
      const ta = document.getElementById("token-output");
      ta.select();
      navigator.clipboard.writeText(ta.value).then(() => setStatus("Token copied!", "#2ecc71"));
    };

    onAuthStateChanged(auth, user => {
      if (user) showToken(user);
    });
  </script>
</body>
</html>
