version: '3.8'

services:
  # Redis Database Engine
  redis:
    image: redis:7-alpine
    container_name: rally-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Rally Realtime Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rally-realtime
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      # Mount the service account key for local development.
      # On Cloud Run this variable is left unset and ADC is used instead.
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-/app/serviceAccountKey.json}
    volumes:
      # Bind-mount the local service account key into the container.
      # The file is gitignored and must be present only on developer machines.
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
