version: '3.8'

services:
  # Rally Realtime Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rally-realtime
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override the credentials path to the container-absolute path.
      - FIREBASE_CREDENTIALS_PATH=/app/serviceAccountKey.json
    volumes:
      # Bind-mount the local service account key into the container.
      # The file is gitignored and must be present only on developer machines.
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    restart: unless-stopped

volumes: {}
